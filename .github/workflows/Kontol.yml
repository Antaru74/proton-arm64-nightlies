name: Build Proton ARM64 Nightly (Termux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PREFIX: /data/data/com.termux/files/usr
      ARCH: arm64

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl zip unzip \
          build-essential clang llvm lld \
          python3 cmake ninja-build meson \
          autoconf automake libtool \
          pkg-config flex bison \
          zstd file

    - name: Clone Proton ARM64 repo
      run: |
        git clone --recursive https://github.com/Antaru74/proton-arm64-nightlies.git proton

    - name: Setup LLVM-MINGW toolchain
      run: |
        wget https://github.com/bylaws/llvm-mingw/releases/download/20250305/llvm-mingw-20250305-ucrt-ubuntu-20.04-x86_64.tar.xz
        tar -xf llvm-mingw-*.tar.xz
        echo "$(pwd)/llvm-mingw-*/bin" >> $GITHUB_PATH

    # =========================
    # CONFIGURE STEP (IMPORTANT)
    # =========================
    - name: Configure Proton ARM64
      run: |
        cd proton
        chmod +x scripts/configure-arm64-build.sh

        ./scripts/configure-arm64-build.sh \
          --prefix=$PREFIX/opt/proton-arm64 \
          --arch=$ARCH

    # =========================
    # BUILD STEP
    # =========================
    - name: Build Proton ARM64
      run: |
        cd proton
        chmod +x scripts/build-proton-arm64.sh
        ./scripts/build-proton-arm64.sh -j$(nproc)

    # =========================
    # STAGING INSTALL
    # =========================
    - name: Install to staging
      run: |
        cd proton
        make install DESTDIR=$PWD/pkg || true

    # =========================
    # CLEANUP SIZE
    # =========================
    - name: Cleanup
      run: |
        find proton/pkg -name "*.a" -delete || true
        find proton/pkg -name "*.la" -delete || true

    # =========================
    # PACKAGE DEB
    # =========================
    - name: Create .deb structure
      run: |
        mkdir -p deb/DEBIAN
        mkdir -p deb/data/data/com.termux/files/usr

        if [ -d proton/pkg ]; then
          cp -r proton/pkg/data/data/com.termux/files/usr/* \
            deb/data/data/com.termux/files/usr/ || true
        fi

    - name: Create control file
      run: |
        cat <<EOF > deb/DEBIAN/control
        Package: proton-arm64-nightly
        Version: 1.0
        Architecture: arm64
        Maintainer: Antaru74
        Description: Proton ARM64 Nightly build for Termux
        EOF

    - name: Build .deb
      run: |
        dpkg-deb -Zxz -z9 --build deb proton-arm64.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proton-arm64-deb
        path: proton-arm64.deb
