name: Build Proton ARM64 Android (NDK Wine)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NAME: proton-arm64-nightly

    steps:
    # =========================
    # DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl zip unzip file \
          build-essential clang llvm lld \
          python3 cmake ninja-build meson \
          autoconf automake libtool \
          pkg-config flex bison \
          zstd

    # =========================
    # CLONE REPO
    # =========================
    - name: Clone Proton ARM64 repo
      run: |
        git clone --recursive https://github.com/Antaru74/proton-arm64-nightlies.git proton

    # =========================
    # SETUP ANDROID NDK (REQUIRED)
    # =========================
    - name: Download Android NDK r27c
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip
        mv android-ndk-r27c $HOME/android-ndk

        echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV

    # =========================
    # CLONE WINE SOURCE (REQUIRED BY SCRIPT)
    # =========================
    - name: Clone Wine source
      run: |
        git clone https://github.com/wine-mirror/wine.git proton/wine-source

    # =========================
    # SETUP TOOL PERMISSION
    # =========================
    - name: Prepare scripts
      run: |
        cd proton
        chmod +x scripts/*.sh

    # =========================
    # CONFIGURE BUILD (NDK CROSS COMPILE)
    # =========================
    - name: Configure ARM64 build
      run: |
        cd proton

        ./scripts/configure-arm64-build.sh \
          --ndk-path "$ANDROID_NDK_HOME" \
          --source-dir ./wine-source \
          --build-dir ./wine-build \
          --api 28 \
          --name proton-arm64-nightly

    # =========================
    # BUILD HOST TOOLS (WAJIB STEP)
    # =========================
    - name: Build host tools
      run: |
        cd proton/wine-build/tools
        make -j$(nproc) __tooldeps__ || make -j$(nproc)

    # =========================
    # BUILD TARGET (ARM64 ANDROID)
    # =========================
    - name: Build Proton ARM64
      run: |
        cd proton/wine-build/target
        make -j$(nproc)

    # =========================
    # INSTALL STAGING
    # =========================
    - name: Install to staging
      run: |
        cd proton/wine-build/target
        make install DESTDIR=$PWD/pkg || true

    # =========================
    # CLEANUP SIZE
    # =========================
    - name: Cleanup
      run: |
        find proton/wine-build -name "*.a" -delete || true
        find proton/wine-build -name "*.la" -delete || true

    # =========================
    # PACKAGE FOR TERMUX (.DEB)
    # =========================
    - name: Create deb structure
      run: |
        mkdir -p deb/DEBIAN
        mkdir -p deb/data/data/com.termux/files/usr

        if [ -d proton/wine-build/target/pkg ]; then
          cp -r proton/wine-build/target/pkg/* \
            deb/data/data/com.termux/files/usr/ || true
        fi

    - name: Create control file
      run: |
        cat <<EOF > deb/DEBIAN/control
        Package: proton-arm64-ndk
        Version: 1.0
        Architecture: arm64
        Maintainer: Antaru74
        Description: Proton/Wine ARM64 Android (NDK build)
        EOF

    # =========================
    # BUILD DEB
    # =========================
    - name: Build .deb package
      run: |
        dpkg-deb -Zxz -z9 --build deb proton-arm64.deb

    # =========================
    # UPLOAD ARTIFACT
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proton-arm64-ndk
        path: proton-arm64.deb
