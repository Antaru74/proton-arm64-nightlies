name: Build Proton ARM64 Termux (.deb)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      PREFIX: /data/data/com.termux/files/usr

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential git wget curl unzip \
          flex bison gettext autoconf automake libtool \
          pkg-config mingw-w64 gcc-multilib g++-multilib \
          zlib1g-dev zstd xz-utils python3 python3-zstandard patch

    # 🔽 Clone Proton source
    - name: Clone Proton source
      run: |
        git clone --depth=1 https://github.com/ValveSoftware/Proton proton-source
        cd proton-source

        WINE_URL=$(git config --file .gitmodules --get submodule.wine.url)
        WINE_COMMIT=$(git ls-tree HEAD wine | awk '{print $3}')

        git clone --depth=1 https://github.com/ValveSoftware/wine wine-source
        cd wine-source
        git fetch --depth=1 origin $WINE_COMMIT
        git checkout FETCH_HEAD

    # 🔽 Clone GameNative patches
    - name: Clone GameNative patches
      run: |
        git clone --depth=1 https://github.com/GameNative/proton-wine gamenative-src
        cp -r gamenative-src/android wine-source/android
        cp -r gamenative-src/build-scripts wine-source/build-scripts

    # 🔽 Setup Termux sysroot
    - name: Setup TermuxFS
      run: |
        mkdir -p $HOME/termuxfs
        cd $HOME/termuxfs
        wget -q https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-aarch64.tar
        tar -xf termuxfs-aarch64.tar

    # 🔽 Setup Android NDK
    - name: Setup Android NDK
      run: |
        mkdir -p $HOME/Android/Sdk/ndk
        cd $HOME/Android/Sdk/ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
        unzip -q android-ndk-r27d-linux.zip
        mv android-ndk-r27d 27.3.13750724

    # 🔽 Setup LLVM MinGW
    - name: Setup LLVM MinGW
      run: |
        mkdir -p $HOME/toolchains
        cd $HOME/toolchains
        wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
        tar -xf llvm-mingw-*.tar.xz
        echo "$HOME/toolchains/llvm-mingw-*/bin" >> $GITHUB_PATH

    # 🔽 Autogen
    - name: Run autogen
      run: |
        cd wine-source
        bash autogen.sh

    # 🔽 Build wine-tools
    - name: Build wine-tools
      run: |
        cd wine-source
        mkdir -p wine-tools
        cd wine-tools
        ../configure --without-x --without-vulkan --without-wayland
        make -j$(nproc) __tooldeps__

    # 🔽 Configure build
    - name: Configure Wine
      run: |
        cd wine-source
        bash build-scripts/build-step-arm64ec.sh --configure

    # 🔽 Build
    - name: Build Wine
      run: |
        cd wine-source
        bash build-scripts/build-step-arm64ec.sh --build

    # 🔽 Install (generate compiled-files-aarch64)
    - name: Install Wine
      run: |
        cd wine-source
        bash build-scripts/build-step-arm64ec.sh --install

    # 🔽 Convert ke .deb
    - name: Prepare .deb structure
      run: |
        OUTPUT_DIR="$HOME/compiled-files-aarch64"

        mkdir -p deb/DEBIAN
        mkdir -p deb/data/data/com.termux/files/usr/opt/proton

        cp -r $OUTPUT_DIR/* deb/data/data/com.termux/files/usr/opt/proton/

    # 🔽 Patch path
    - name: Patch Android paths
      run: |
        find deb -type f -exec sed -i \
          's|/data/data/app.gamenative/files/imagefs|/data/data/com.termux/files/usr|g' {} + || true

    # 🔽 Wrapper
    - name: Create launcher
      run: |
        mkdir -p deb/data/data/com.termux/files/usr/bin

        cat <<'EOF' > deb/data/data/com.termux/files/usr/bin/proton-arm64
        #!/data/data/com.termux/files/usr/bin/sh
        export PROTON_DIR=/data/data/com.termux/files/usr/opt/proton
        export LD_LIBRARY_PATH=$PROTON_DIR/lib:$LD_LIBRARY_PATH
        export WINEPREFIX=$HOME/.wine
        exec $PROTON_DIR/bin/wine "$@"
        EOF

        chmod +x deb/data/data/com.termux/files/usr/bin/proton-arm64

    # 🔽 Cleanup
    - name: Cleanup
      run: |
        find deb -name "*.a" -delete || true
        find deb -name "*.la" -delete || true

    # 🔽 Control file
    - name: Create control file
      run: |
        cat <<EOF > deb/DEBIAN/control
        Package: proton-arm64
        Version: 11.0
        Architecture: aarch64
        Maintainer: you
        Depends: libc++, zlib, zstd
        Description: Proton ARM64 (converted for Termux)
        EOF

    # 🔽 Build deb
    - name: Build .deb
      run: |
        dpkg-deb -Zxz -z9 --build deb proton-arm64.deb

    # 🔽 Verify
    - name: Verify package
      run: |
        dpkg-deb -I proton-arm64.deb
        dpkg-deb -c proton-arm64.deb | head

    # 🔽 Upload
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proton-arm64-deb
        path: proton-arm64.deb
