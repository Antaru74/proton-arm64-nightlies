name: Proton_11 Build Termux

on:
  schedule:
    - cron: '15 */24 * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted
      target_app_id:
        description: 'Target Android app id for hardcoded wine paths'
        required: false
        default: 'app.gamenative'
        type: choice
        options:
          - app.gamenative
          - com.winlator.cmod
          - com.termux
      wine_ref:
        description: 'Valve Proton ref'
        required: false
        default: 'proton_11.0'
        type: string
      gamenative_ref:
        required: false
        default: 'proton_10.0'
        type: string
      release_description:
        required: false
        default: ''
        type: string
      force_build:
        required: false
        default: false
        type: boolean
      build_termux_deb:
        required: false
        default: false
        type: boolean
      build_termux_native:
        description: 'Build native Termux runtime package (aarch64 sysroot staged)'
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    outputs:
      skip_build: ${{ steps.upstream.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream
        id: upstream
        run: |
          echo "skip_build=false" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    if: needs.prepare.outputs.skip_build != 'true'

    strategy:
      matrix:
        include:
          - arch_id: arm64ec
            termux_arch: aarch64
            output_dir: out-aarch64
            profile_version: 11-arm64ec

    steps:
      - uses: actions/checkout@v4

      - name: Build Wine
        run: |
          cd wine-source
          bash build.sh --build

      - name: Install staging
        run: |
          cd wine-source
          bash build.sh --install

          OUTPUT="$HOME/${{ matrix.output_dir }}"
          echo "Installed to $OUTPUT"

      - name: Cleanup
        run: |
          OUTPUT="$HOME/${{ matrix.output_dir }}"
          find "$OUTPUT" -name "*.a" -delete || true
          find "$OUTPUT" -name "*.la" -delete || true

      # =========================
      # TERMUX DEB PACKAGE
      # =========================
      - name: Prepare Termux .deb
        if: ${{ github.event.inputs.build_termux_deb == 'true' }}
        run: |
          OUTPUT="$HOME/${{ matrix.output_dir }}"

          mkdir -p deb/DEBIAN
          mkdir -p deb/data/data/com.termux/files/usr

          cp -r "$OUTPUT"/* deb/data/data/com.termux/files/usr/ || true

      - name: Create control
        if: ${{ github.event.inputs.build_termux_deb == 'true' }}
        run: |
          cat > deb/DEBIAN/control <<EOF
Package: proton-termux
Version: 11.0
Architecture: arm64
Maintainer: github-actions
Depends: libc++, libx11, libxcb, libwayland, libdrm, zlib, zstd
Description: Proton 11 Termux package
EOF

      - name: Build .deb
        if: ${{ github.event.inputs.build_termux_deb == 'true' }}
        run: |
          dpkg-deb -Zxz -z9 --build deb "$HOME/${{ matrix.output_dir }}/proton-termux.deb"

      # =========================
      # TERMUX NATIVE PACKAGE (STAGING SYSROOT)
      # =========================
      - name: Build Termux native sysroot (aarch64)
        if: ${{ github.event.inputs.build_termux_native == 'true' }}
        run: |
          SYSROOT="$HOME/termux-native"
          OUTPUT="$HOME/${{ matrix.output_dir }}"

          rm -rf "$SYSROOT"
          mkdir -p "$SYSROOT/usr"

          cp -r "$OUTPUT"/* "$SYSROOT/usr/" || true

          echo "Termux native sysroot prepared"
          ls -la "$SYSROOT/usr/bin" || true

      # =========================
      # UPLOAD
      # =========================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-aarch64
          path: |
            $HOME/${{ matrix.output_dir }}
            $HOME/${{ matrix.output_dir }}/proton-termux.deb
            $HOME/termux-native
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Done
        run: echo "release ready"
